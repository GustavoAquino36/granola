<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Granola · Valerius</title>
    <!--
      Aplica o tema ANTES do React hidratar pra evitar flash.
      Le localStorage; se nao existir, usa 'light' (default do produto).
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("granola:theme");
          document.documentElement.dataset.theme = t === "dark" ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
